<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBid — Seller Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background:var(--dark-bg); }

        .seller-layout {
            display:grid;
            grid-template-columns:1fr 1.2fr;
            gap:28px;
            max-width:1100px;
            margin:0 auto;
            padding:30px 20px 40px;
        }

        .panel {
            background:var(--panel-bg);
            border:1px solid var(--border);
            border-radius:6px;
            padding:28px;
        }
        .panel h3 { color:var(--gold-primary); font-size:1.2rem; letter-spacing:2px; margin-bottom:22px; border-bottom:1px solid var(--border); padding-bottom:10px; }

        .image-upload-area {
            border:2px dashed var(--border);
            border-radius:4px;
            padding:30px;
            text-align:center;
            cursor:pointer;
            transition:0.3s;
            margin-bottom:16px;
            position:relative;
        }
        .image-upload-area:hover { border-color:var(--gold-primary); }
        .image-upload-area p { color:var(--text-dim); font-family:Arial,sans-serif; font-size:0.9rem; }
        .image-upload-area input { position:absolute; inset:0; opacity:0; cursor:pointer; }
        #image-preview {
            width:100%; max-height:200px; object-fit:contain;
            display:none; border-radius:4px; margin-top:10px;
        }

        .room-indicator {
            background:var(--input-bg);
            border:1px solid var(--border);
            border-radius:4px;
            padding:14px 16px;
            margin-bottom:18px;
            font-family:Arial,sans-serif;
        }
        .room-indicator .room-label { font-size:0.75rem; color:var(--text-dim); text-transform:uppercase; margin-bottom:4px; }
        .room-indicator .room-value { font-size:1rem; font-weight:bold; }
        .room-indicator .room-token { color:var(--text-dim); font-size:0.82rem; margin-top:2px; }

        /* Listed Items */
        .items-grid {
            display:grid; grid-template-columns:1fr 1fr;
            gap:14px;
        }
        .seller-item {
            background:var(--input-bg);
            border:1px solid var(--border);
            border-radius:5px;
            padding:12px;
            font-family:Arial,sans-serif;
        }
        .seller-item img { width:100%; height:80px; object-fit:cover; border-radius:3px; margin-bottom:8px; }
        .seller-item .s-name { font-size:0.88rem; font-weight:bold; margin-bottom:3px; }
        .seller-item .s-price { color:var(--gold-primary); font-size:0.82rem; }
        .seller-item .s-room { color:var(--text-dim); font-size:0.75rem; }
        .seller-item .s-token { font-size:0.72rem; color:var(--text-muted); }
        .seller-item .s-status {
            display:inline-block; font-size:0.7rem;
            padding:2px 7px; border-radius:3px;
            margin-top:5px; font-weight:bold;
        }
        .s-status.live { background:#1a3a2a; color:var(--success); }
        .s-status.sold { background:#2a1a1a; color:var(--danger); }
        .s-status.waiting { background:#1a1a2a; color:var(--info); }

        @media(max-width:800px){
            .seller-layout { grid-template-columns:1fr; }
            .items-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-wrapper">
    <div class="section-heading" style="padding-top:30px;">
        <h2>SELLER DASHBOARD</h2>
        <p>Upload your item and it will be placed in the correct auction room automatically.</p>
    </div>

    <div class="seller-layout">
        <!-- Upload Form -->
        <div class="panel">
            <h3>LIST NEW ITEM</h3>

            <div class="input-group">
                <label>Object Name</label>
                <input type="text" id="item-name" placeholder="e.g. Vintage Rolex Watch">
            </div>

            <div class="input-group">
                <label>Object Image</label>
                <div class="image-upload-area">
                    <p>📷 Click to upload image</p>
                    <input type="file" id="item-image" accept="image/*" onchange="previewImage(event)">
                </div>
                <img id="image-preview" src="" alt="Preview">
            </div>

            <div class="input-group">
                <label>Base Price (₹)</label>
                <input type="number" id="item-price" placeholder="e.g. 15000" min="1" oninput="updateRoomIndicator()">
            </div>

            <div id="room-indicator" class="room-indicator" style="display:none;">
                <div class="room-label">Will be placed in</div>
                <div class="room-value" id="room-val">—</div>
                <div class="room-token" id="room-token">Token: —</div>
            </div>

            <div class="input-group">
                <label>Category</label>
                <select id="item-category">
                    <option value="">Select category</option>
                    <option>Electronics</option>
                    <option>Home Appliances</option>
                    <option>Fashion</option>
                    <option>Mobiles</option>
                    <option>Sports</option>
                    <option>Books</option>
                </select>
            </div>

            <div class="input-group">
                <label>Description</label>
                <textarea id="item-desc" placeholder="Describe your item — condition, age, special features..."></textarea>
            </div>

            <button class="btn-gold" style="width:100%;padding:16px;" onclick="submitItem()">SUBMIT TO AUCTION ➜</button>
        </div>

        <!-- My Listed Items -->
        <div class="panel">
            <h3>MY LISTED ITEMS</h3>
            <div class="items-grid" id="my-items">
                <p style="color:var(--text-muted);font-family:Arial,sans-serif;font-size:0.88rem;grid-column:1/-1;">No items listed yet. Upload your first item!</p>
            </div>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script src="js/app.js"></script>
<script>
    if (!requireAuth()) {}
    document.getElementById('nav-placeholder').innerHTML = renderTopNav();
    checkPendingNotifications();

    let imageDataURL = null;

    function previewImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 600; // Resize to save localStorage space
                let width = img.width;
                let height = img.height;
                
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // Compress as JPEG
                imageDataURL = canvas.toDataURL('image/jpeg', 0.7);
                
                const prev = document.getElementById('image-preview');
                prev.src = imageDataURL;
                prev.style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function updateRoomIndicator() {
        const price = Number(document.getElementById('item-price').value);
        if (!price) { document.getElementById('room-indicator').style.display='none'; return; }
        const room = State.getRoomForPrice(price);
        const token = State.getTokenInRoom(room);
        const roomData = ROOMS[room-1];
        const ind = document.getElementById('room-indicator');
        ind.style.display = 'block';
        ind.style.borderColor = roomData.color;
        document.getElementById('room-val').innerHTML = `<span style="color:${roomData.color}">${roomData.label}</span> &nbsp;(${roomData.range})`;
        document.getElementById('room-token').textContent = `Token #${token} in this room`;
    }

    function submitItem() {
        const name  = document.getElementById('item-name').value.trim();
        const price = Number(document.getElementById('item-price').value);
        const cat   = document.getElementById('item-category').value;
        const desc  = document.getElementById('item-desc').value.trim();

        if (!name) { alert('Please enter object name.'); return; }
        if (!price || price < 1) { alert('Please enter a valid base price.'); return; }
        if (!cat) { alert('Please select a category.'); return; }
        if (!desc) { alert('Please enter a description.'); return; }

        const room = State.getRoomForPrice(price);
        const token = State.getTokenInRoom(room);

        const item = {
            id: 'item_' + Date.now(),
            name, basePrice: price, category: cat,
            description: desc,
            image: imageDataURL || 'https://via.placeholder.com/300x200/141414/c5a059?text=' + encodeURIComponent(name),
            room, token,
            seller: State.currentUser.username,
            status: 'waiting',
            listedAt: Date.now()
        };

        State.addItem(item);
        showToast('Item Listed!', `<b>${name}</b> added to Room ${room} as Token #${token}`);
        renderMyItems();

        // Reset form
        document.getElementById('item-name').value = '';
        document.getElementById('item-price').value = '';
        document.getElementById('item-category').value = '';
        document.getElementById('item-desc').value = '';
        document.getElementById('image-preview').style.display = 'none';
        document.getElementById('room-indicator').style.display = 'none';
        imageDataURL = null;
    }

    function renderMyItems() {
        const user = State.currentUser;
        const mine = State.items.filter(i => i.seller === user.username);
        const grid = document.getElementById('my-items');
        if (!mine.length) {
            grid.innerHTML = '<p style="color:var(--text-muted);font-family:Arial,sans-serif;font-size:0.88rem;grid-column:1/-1;">No items listed yet. Upload your first item!</p>';
            return;
        }
        grid.innerHTML = mine.map(i => {
            const statusClass = i.status === 'sold' ? 'sold' : (i.status === 'live' ? 'live' : 'waiting');
            const statusLabel = i.status === 'sold' ? 'SOLD' : (i.status === 'live' ? 'LIVE' : 'WAITING');
            return `
            <div class="seller-item">
                <img src="${i.image}" alt="${i.name}" onerror="this.src='https://via.placeholder.com/200x80/141414/c5a059?text=Image'">
                <div class="s-name">${i.name}</div>
                <div class="s-price">₹${Number(i.basePrice).toLocaleString()}</div>
                <div class="s-room">Room ${i.room} &nbsp;|&nbsp; ${i.category}</div>
                <div class="s-token">Token #${i.token}</div>
                <span class="s-status ${statusClass}">${statusLabel}</span>
            </div>`;
        }).join('');
    }

    renderMyItems();
</script>
</body>
</html>
