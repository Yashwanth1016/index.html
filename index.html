<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBid — Premium Auction Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { overflow:hidden; display:flex; justify-content:center; align-items:center; height:100vh; }

        /* ── Welcome Screen ── */
        #welcome-screen {
            position:absolute; inset:0;
            display:flex; flex-direction:column;
            justify-content:center; align-items:center;
            background:
                linear-gradient(rgba(0,0,0,0.68), rgba(0,0,0,0.68)),
                url('https://images.unsplash.com/photo-1589216532372-1c2a367900d9?auto=format&fit=crop&q=80')
                center/cover no-repeat;
            transition:opacity 0.6s ease;
        }
        .welcome-logo {
            font-size:5.5rem; font-weight:bold;
            color:var(--gold-primary);
            letter-spacing:10px;
            text-shadow:0 0 40px rgba(197,160,89,0.4);
            margin-bottom:8px;
        }
        .welcome-tagline {
            color:#c9c9c9; font-size:1.2rem;
            font-family:Arial,sans-serif; letter-spacing:3px;
            margin-bottom:50px;
        }
        .enter-btn {
            background:var(--gold-primary); color:#000;
            border:none; padding:18px 64px;
            font-size:1.1rem; font-weight:bold;
            text-transform:uppercase; letter-spacing:2px;
            cursor:pointer;
            box-shadow:0 4px 24px rgba(197,160,89,0.4);
            transition:0.3s;
        }
        .enter-btn:hover { background:var(--gold-hover); transform:translateY(-3px); }

        /* ── Auth Screen ── */
        #auth-screen {
            position:absolute; inset:0;
            display:none; flex-direction:row;
        }
        .brand-panel {
            flex:1.2;
            background:
                linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
                url('https://images.unsplash.com/photo-1505664194779-8beaceb93744?auto=format&fit=crop&q=80')
                center/cover no-repeat;
            display:flex; flex-direction:column;
            justify-content:center; padding-left:8%;
        }
        .brand-panel h1 { font-size:4.5rem; color:var(--gold-primary); margin-bottom:18px; }
        .brand-panel p { color:var(--text-dim); max-width:380px; line-height:1.7; font-family:Arial,sans-serif; font-size:1rem; }

        .form-panel {
            flex:0.85;
            background:var(--panel-bg);
            display:flex; flex-direction:column;
            justify-content:center; padding:0 5%;
            border-left:1px solid #2a2a2a;
            overflow-y:auto;
        }
        .tabs { margin-bottom:32px; }
        .tab-link {
            color:var(--text-dim);
            margin-right:28px;
            font-size:1rem;
            padding-bottom:5px;
            cursor:pointer;
            text-transform:uppercase;
            letter-spacing:1px;
            border-bottom:2px solid transparent;
            transition:0.2s;
        }
        .tab-link.active { color:var(--gold-primary); border-bottom-color:var(--gold-primary); }
        .form-panel h2 { font-size:2.2rem; margin-bottom:6px; }
        .form-panel .subtext { color:var(--text-dim); margin-bottom:26px; font-family:Arial,sans-serif; font-size:0.9rem; }

        .terms-check {
            display:flex; align-items:center; gap:10px;
            margin-bottom:14px;
            font-family:Arial,sans-serif; font-size:0.85rem; color:var(--text-dim);
        }
        .terms-check input { accent-color:var(--gold-primary); width:15px; height:15px; }
        .terms-link { color:var(--gold-primary); cursor:pointer; text-decoration:underline; }

        .action-btn {
            width:100%;
            background:var(--gold-primary); border:none;
            padding:16px; font-weight:bold;
            font-size:1rem; cursor:pointer;
            text-transform:uppercase; letter-spacing:1px;
            transition:0.3s;
        }
        .action-btn:hover { background:var(--gold-hover); }

        /* responsive */
        @media(max-width:768px){
            .brand-panel { display:none; }
            #auth-screen { flex-direction:column; }
            .form-panel { flex:1; padding:30px 6%; }
        }
    </style>
</head>
<body>

<!-- ══════════════ WELCOME SCREEN ══════════════ -->
<div id="welcome-screen">
    <div class="welcome-logo">OPENBID</div>
    <p class="welcome-tagline">Bid Smart. Win Big. The Premium Auction Experience.</p>
    <button class="enter-btn" onclick="goToAuth()">Enter Platform</button>
</div>

<!-- ══════════════ AUTH SCREEN ══════════════ -->
<div id="auth-screen">

    <!-- Left Brand Panel -->
    <div class="brand-panel">
        <h1>OPENBID</h1>
        <p>A premium real-time auction platform. Create rooms, bid live, and let the best offer win.</p>
    </div>

    <!-- Right Form Panel -->
    <div class="form-panel">
        <div class="tabs">
            <span class="tab-link active" onclick="switchForm('login')">Sign In</span>
            <span class="tab-link" onclick="switchForm('register')">Register</span>
        </div>

        <!-- LOGIN FORM -->
        <div id="login-form">
            <h2>Welcome back</h2>
            <p class="subtext">Sign in to access your auctions</p>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="login-user" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            <div class="terms-check">
                <input type="checkbox" id="login-terms">
                <label for="login-terms">I agree to the <span class="terms-link" onclick="openTerms()">Terms &amp; Conditions</span></label>
            </div>
            <button class="action-btn" onclick="handleLogin()">SIGN IN &rarr;</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-form" class="hidden">
            <h2>Create Account</h2>
            <p class="subtext">Join the world's elite bidders</p>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name">
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="reg-phone" placeholder="+91 XXXXX XXXXX">
            </div>
            <div class="input-group">
                <label>Email ID</label>
                <input type="email" id="reg-email" placeholder="name@email.com">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="reg-user" placeholder="Choose a username">
            </div>
            <div class="input-group">
                <label>Set Password</label>
                <input type="password" id="reg-pass" placeholder="Create a strong password">
            </div>
            <div class="terms-check">
                <input type="checkbox" id="reg-terms">
                <label for="reg-terms">I agree to the <span class="terms-link" onclick="openTerms()">Terms &amp; Conditions</span></label>
            </div>
            <button class="action-btn" onclick="handleRegister()">REGISTER NOW &rarr;</button>
        </div>
    </div>
</div>

<!-- ══════════════ TERMS MODAL ══════════════ -->
<div class="modal-overlay hidden" id="terms-modal">
    <div class="modal-box">
        <h2>TERMS &amp; CONDITIONS</h2>
        <div class="modal-body" id="terms-body"></div>
        <div class="modal-footer">
            <button class="btn-gold" onclick="acceptTerms()">I ACCEPT</button>
            <button class="btn-outline" onclick="closeTerms()">CLOSE</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
<script>
    // Inject terms
    document.getElementById('terms-body').innerHTML = TERMS_HTML;

    function goToAuth() {
        document.getElementById('welcome-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('welcome-screen').style.display = 'none';
            const a = document.getElementById('auth-screen');
            a.style.display = 'flex';
        }, 500);
    }

    function switchForm(type) {
        const isLogin = type === 'login';
        document.getElementById('login-form').classList.toggle('hidden', !isLogin);
        document.getElementById('register-form').classList.toggle('hidden', isLogin);
        document.querySelectorAll('.tab-link').forEach((el, i) => {
            el.classList.toggle('active', isLogin ? i===0 : i===1);
        });
    }

    function handleLogin() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value;
        const agreed = document.getElementById('login-terms').checked;
        if (!agreed) { alert('Please agree to the Terms & Conditions to continue.'); return; }
        if (!user || !pass) { alert('Please fill in all fields.'); return; }
        
        fetch('http://localhost:5000/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        })
        .then(res => res.json())
        .then(data => {
            if (data.user) {
                State.setUser(data.user);
                window.location.href = 'role.html';
            } else {
                alert(data.error || 'Incorrect credentials. Please try again.');
            }
        })
        .catch(err => {
            console.error(err);
            // Fallback for hardcoded if backend is not running
            if (user === 'Surya' && pass === '12345') {
                State.setUser({ username:'Surya', fullName:'Surya', email:'surya@openbid.com', phone:'+91 98765 43210' });
                window.location.href = 'role.html';
            } else {
                alert('Error connecting to backend server.');
            }
        });
    }

    function handleRegister() {
        const name  = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const user  = document.getElementById('reg-user').value.trim();
        const pass  = document.getElementById('reg-pass').value;
        const agreed = document.getElementById('reg-terms').checked;
        if (!agreed) { alert('Please agree to the Terms & Conditions to continue.'); return; }
        if (!name||!phone||!email||!user||!pass) { alert('Please fill in all fields.'); return; }
        
        fetch('http://localhost:5000/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass, fullName: name, email: email, phone: phone })
        })
        .then(res => res.json())
        .then(data => {
            if (data.user || data.message) {
                State.setUser({ username: user, fullName: name, email: email, phone: phone });
                window.location.href = 'role.html';
            } else {
                alert(data.error || 'Error registering user.');
            }
        })
        .catch(err => {
            console.error(err);
            // Fallback
            State.setUser({ username: user, fullName: name, email, phone });
            window.location.href = 'role.html';
        });
    }

    function openTerms() {
        document.getElementById('terms-modal').classList.remove('hidden');
    }
    function closeTerms() {
        document.getElementById('terms-modal').classList.add('hidden');
    }
    function acceptTerms() {
        // Check whichever form is visible
        const loginVisible = !document.getElementById('login-form').classList.contains('hidden');
        if (loginVisible) document.getElementById('login-terms').checked = true;
        else document.getElementById('reg-terms').checked = true;
        closeTerms();
    }
</script>
</body>
</html>
